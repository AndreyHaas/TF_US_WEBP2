		<link href="WEBP2-04-Loesung1.css" type="text/css" rel="stylesheet">
		<script>
			function ausgeben(ev) {
				document.getElementById('rangeout').value = ev.target.value;
			}
			function ausgeben2(ev) {
				document.getElementById('colorout').value = ev.target.value;
			}
		</script>
	</head>

	<body onload="document.getElementById('rangefeld').addEventListener('input', ausgeben);
				  document.getElementById('colorfeld').addEventListener('input', ausgeben2);">
		<p></p>
		<form id="formular" action="WEBP2-05-Loesung1.php" target="_blank" method="post">

			<label>Checkbox-Gruppe:</label><br><br>

			<label for="c1"> Schnitzel</label><br>
			<input type="checkbox" id="c2" name="check1[]" value="Burger">
			<label for="c2"> Burger</label><br>
			<input type="checkbox" id="c3" name="check1[]" value="Fritten">
			<label for="c3"> Fritten</label><br>
			<input type="checkbox" id="c4" name="check1[]" value="Currywurst">
			<label for="c4"> Currywurst</label><br>

			<br><hr><br>

			<label>Checkbox-Standalone:</label><br><br>
			<input type="checkbox" id="b1" name="check2_1" value="Schnitzel">

			<input type="checkbox" id="b2" name="check2_2" value="Burger">
			<label for="b2"> Burger</label><br>
			<input type="checkbox" id="b3" name="check2_3" value="Fritten">

			<input type="checkbox" id="b4" name="check2_4" value="Currywurst">

			<br><hr><br>
			<table>
				<tr><td><label for="textfeld">Ein simples Textfeld</label></td>
				<td><input id="textfeld" type="text" name="textfeld" maxlength="30"></td></tr>
			 
				<tr><td><label for="telfeld">Ein Telefonfeld</label> </td>
				<td><input id="telfeld" type="tel" name="telfeld" maxlength="30"></td></tr>

				<tr><td><label for="passfeld">Ein Passwortfeld</label> </td>
				<td><input id="passfeld" type="password" name="passfeld" maxlength="30"></td></tr>

				<tr><td><label for="urlfeld">Ein URL-Feld</label> </td>
				<td><input id="urlfeld" type="url" name="urlfeld" maxlength="30"></td></tr>

				<tr><td><label for="emailfeld">Ein email-Feld</label> </td>
				<td><input id="emailfeld" type="email" name="emailfeld" maxlength="30"></td></tr>

				<tr><td><label for="hiddenfeld">Ein hidden-Feld</label> </td>
				<td><input id="hiddenfeld" type="hidden" name="hiddenfeld" value= "KUNDENALARM" maxlength="30"></td></tr>
				
				<tr><td><label for="filefeld">Ein file-Feld</label> </td>
				<td><input id="filefeld" type="file" name="filefeld"  maxlength="30"></td></tr>

				<tr><td><label for="colorfeld">Ein color-Feld</label> </td>
				<td><input id="colorfeld" type="color" name="colorfeld" maxlength="30"></td>
				<td><output id="colorout" for="colorfeld">30</output></td></tr>
				
				<tr><td><label for="numberfeld">Ein number-Feld</label> </td>
				<td><input id="numberfeld" type="number" name="numberfeld" min="30" max="70" value="50"><br></td></tr>

				<tr><td><label for="rangefeld">Ein range-Feld</label> </td>
				<td><input id="rangefeld" type="range" name="rangefeld" type="range" min="0" max="100" value="30"></td>
				<td><output id="rangeout" for="rangefeld">30</output></td></tr>
